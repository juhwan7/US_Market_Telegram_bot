name: US Market Telegram Bot

on:
  push:
    branches: [ "main" ]
  schedule: # 들여쓰기를 push와 동일한 선상으로 수정
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 환경 세팅
        uses: actions/setup-python@v5 # 끝에 있던 'ㅅ' 제거
        with:
          python-version: '3.11' # 끝에 있던 'ㅅ' 제거

      - name: 패키지 강제 직접 설치 (에러 해결의 핵심)
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai yfinance pandas requests feedparser

      - name: 파이썬 스크립트 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py