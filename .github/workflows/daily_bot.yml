name: US Market Telegram Bot

on:
  schedule:
    # 한국 아침 6시 (UTC 전날 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4 # v3에서 v4로 업데이트

      - name: 파이썬 환경 세팅
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.10'

      - name: 필요한 패키지 설치
        run: |
          python -m pip install --upgrade pip
          # requirements.txt 파일이 있으면 설치, 없으면 스킵하도록 설정
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 파이썬 스크립트 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
