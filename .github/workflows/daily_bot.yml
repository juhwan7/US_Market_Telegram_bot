name: US Market Telegram Bot

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 가장 안정적인 3.11 버전 권장

      - name: 필요한 패키지 설치
        run: |
          python -m pip install --upgrade pip
          # 구글 최신 SDK와 필요한 라이브러리 강제 설치
          pip install -U google-genai yfinance pandas requests feedparser

      - name: 파이썬 스크립트 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py